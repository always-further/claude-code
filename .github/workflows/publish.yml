name: Publish nono package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish package
        uses: always-further/agent-sign@8fb02d197e575c34f4f77f43a9087a0fccdd8e2f # v0.0.6
        with:
          publish: "true"
          package-name: claude-code
          package-namespace: always-further
          package-version: ${{ github.ref_name }}
          nono-version: latest
          package-path: .
          registry-url: https://x2b3g8ac61ld.share.zrok.io
          files: |
            package.json
            claude-code.profile.json
            CLAUDE.md
            hooks/nono-hook.sh
            groups.json
            trust-policy.json
